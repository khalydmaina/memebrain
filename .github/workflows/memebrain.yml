name: memebrain

on:
  schedule:
    # scan: every 20 min (GitHub may delay scheduled runs by a few minutes)
    - cron: "3,23,43 * * * *"
    # train: daily refit + Telegram report
    - cron: "10 0 * * *"
  workflow_dispatch: {}

# One run at a time — concurrent runs would race on memebrain.db.
concurrency:
  group: memebrain
  cancel-in-progress: false

jobs:
  scan:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule != '10 0 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write     # needed to commit the db back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py --once

      - name: Commit db
        run: |
          git config user.name  "memebrain-bot"
          git config user.email "bot@users.noreply.github.com"
          git add memebrain.db
          if git diff --staged --quiet; then
            echo "No db changes"
          else
            git commit -m "db: $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
            # Another run may have pushed while we worked; rebase and retry once.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

  train:
    if: github.event.schedule == '10 0 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Daily training + report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py --train

      - name: Commit db
        run: |
          git config user.name  "memebrain-bot"
          git config user.email "bot@users.noreply.github.com"
          git add memebrain.db
          if git diff --staged --quiet; then
            echo "No db changes"
          else
            git commit -m "train: $(date -u '+%Y-%m-%d') [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
